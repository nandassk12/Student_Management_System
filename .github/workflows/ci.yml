name: SMS Fullstack CI/CD

on:
  push:
    branches:
      - main
      - phase-2
  pull_request:
    branches:
      - main
      - phase-2

jobs:
  # ─── 1. Frontend Verification ────────────────────────────────────────────────
  frontend-ci:
    name: Frontend Build & Verify
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm install

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  # ─── 2. Backend Verification ─────────────────────────────────────────────────
  backend-ci:
    name: Backend Test & Verify
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/test_db
      SECRET_KEY: dummy_secret_key_for_testing_purposes
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libpq-dev gcc

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest httpx

      - name: Verify application imports
        run: python -c "import main"

      - name: Run backend tests
        run: python -m pytest tests/

  # ─── 3. Docker Build Verification ──────────────────────────────────────────
  docker-ci:
    name: Docker Build Verify
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Backend Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false

      - name: Build Frontend Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false
