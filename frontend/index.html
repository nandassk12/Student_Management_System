<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Primary SEO -->
    <title>EduPortal — Student Management System</title>
    <meta
      name="description"
      content="A modern college Student Management System for admins, teachers, and students. Manage courses, attendance, grades, fees, and more."
    />
    <meta name="keywords" content="student management, college portal, attendance, grades, courses, EduPortal" />
    <meta name="author" content="EduPortal" />
    <meta name="robots" content="noindex, nofollow" />

    <!-- Open Graph -->
    <meta property="og:type"        content="website" />
    <meta property="og:title"       content="EduPortal — Student Management System" />
    <meta property="og:description" content="Manage courses, attendance, grades, and fees in one unified portal." />
    <meta property="og:image"       content="/og-image.png" />

    <!-- Theme -->
    <meta name="theme-color" content="#0f172a" />
    <meta name="color-scheme" content="light" />

    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <style>
      /* Prevent flash of unstyled content */
      html, body, #root {
        margin: 0;
        padding: 0;
        height: 100%;
        background-color: #f8fafc;
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      /* Initial loading spinner (shown before React mounts) */
      #initial-loader {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #f8fafc;
        z-index: 9999;
        transition: opacity 300ms ease;
      }

      #initial-loader.hidden {
        opacity: 0;
        pointer-events: none;
      }

      .loader-ring {
        width: 40px;
        height: 40px;
        border: 3px solid #e2e8f0;
        border-top-color: #1e3a5f;
        border-radius: 50%;
        animation: spin 700ms linear infinite;
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>

  <body>
    <!-- Pre-React loader — hidden once app mounts -->
    <div id="initial-loader" aria-hidden="true">
      <div class="loader-ring"></div>
    </div>

    <!-- React root -->
    <div id="root"></div>

    <script type="module" src="/src/main.jsx"></script>

    <script>
      // Hide the initial loader once the page has fully loaded
      window.addEventListener('load', () => {
        const loader = document.getElementById('initial-loader');
        if (loader) {
          loader.classList.add('hidden');
          setTimeout(() => loader.remove(), 350);
        }
      });
    </script>
  </body>
</html>
